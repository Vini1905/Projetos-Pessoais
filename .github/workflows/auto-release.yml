name: Auto Release — Criar branch e PRs ao merge na develop

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release:
    name: Criar Release e PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obter versão do package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Versão detectada: $VERSION"

      - name: Verificar se release já existe
        id: check
        run: |
          if git ls-remote --heads origin "release/${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Branch release/${{ steps.version.outputs.version }} já existe, pulando..."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Branch release/${{ steps.version.outputs.version }} não existe, criando..."
          fi

      - name: Criar branch release
        if: steps.check.outputs.exists == 'false'
        run: |
          git checkout main
          git checkout -b "release/${{ steps.version.outputs.version }}"
          git push origin "release/${{ steps.version.outputs.version }}"

      - name: Criar PR develop → release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base "release/${{ steps.version.outputs.version }}" \
            --head develop \
            --title "release: v${{ steps.version.outputs.version }} — develop → release" \
            --body "## Summary

          PR automático criado pelo workflow de auto-release.

          Promove as mudanças da \`develop\` para \`release/${{ steps.version.outputs.version }}\`.

          ### CI
          Este PR aciona o workflow \`ci-release.yml\` que valida lint, testes com cobertura ≥90% e build.

          ### Próximo passo
          Após aprovação e merge, um novo PR será criado automaticamente de \`release/${{ steps.version.outputs.version }}\` → \`main\`."
