name: CI - Feature → Develop

on:
  pull_request:
    branches: [develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Testes e Cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - name: Verificar cobertura mínima (90%)
        run: |
          npm run test:coverage 2>&1 | tee coverage-output.txt
          STATEMENTS=$(grep "Statements" coverage-output.txt | grep -oP '[\d.]+(?=%)')
          if (( $(echo "$STATEMENTS < 90" | bc -l) )); then
            echo "❌ Cobertura abaixo de 90%: ${STATEMENTS}%"
            exit 1
          fi
          echo "✅ Cobertura OK: ${STATEMENTS}%"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
