name: CI - Develop → Release

on:
  pull_request:
    branches:
      - 'release/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Testes e Cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Executar testes com cobertura
        run: npm run test:coverage -- --reporter=verbose 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee coverage-output.txt
      - name: Verificar cobertura mínima (90%)
        run: |
          STATEMENTS=$(grep "Statements" coverage-output.txt | grep -oE '[0-9]+\.?[0-9]*' | head -1)
          echo "Cobertura de Statements: ${STATEMENTS}%"
          if [ -z "$STATEMENTS" ]; then
            echo "Não foi possível extrair a cobertura do relatório"
            exit 1
          fi
          RESULT=$(echo "$STATEMENTS < 90" | bc -l)
          if [ "$RESULT" = "1" ]; then
            echo "Cobertura abaixo de 90%: ${STATEMENTS}%"
            exit 1
          fi
          echo "Cobertura OK: ${STATEMENTS}%"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
