name: CI - Release → Main

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Testes e Cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Executar testes com cobertura
        run: npm run test:coverage 2>&1 | sed 's/\x1b\[[0-9;]*m//g' > coverage-output.txt; cat coverage-output.txt
      - name: Verificar cobertura mínima (90%)
        run: |
          STMTS=$(grep "All files" coverage-output.txt | awk -F'|' '{gsub(/ /,"",$2); print $2}')
          echo "Cobertura de Statements: ${STMTS}%"
          if [ -z "$STMTS" ]; then
            echo "Não foi possível extrair a cobertura do relatório"
            cat coverage-output.txt
            exit 1
          fi
          RESULT=$(echo "$STMTS < 90" | bc -l)
          if [ "$RESULT" = "1" ]; then
            echo "Cobertura abaixo de 90%: ${STMTS}%"
            exit 1
          fi
          echo "Cobertura OK: ${STMTS}%"

  build:
    name: Build de Produção
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
